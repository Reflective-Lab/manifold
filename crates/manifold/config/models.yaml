# =============================================================================
# CAPABILITY DEFINITIONS
# =============================================================================
#
# Capabilities that models can have:
#
# tool_use          - Function/tool calling support
# vision            - Image understanding
# structured_output - JSON mode / schema enforcement
# code              - Code generation/understanding
# reasoning         - Multi-step logical reasoning
# multilingual      - Good performance across languages
# web_search        - Real-time web information retrieval
#
# Model types:
#
# (default)         - LLM for chat/completion
# embedding         - Vector embedding model
# reranker          - Cross-encoder reranking model
#
# Architecture types:
#
# dense             - Traditional transformer (all parameters active)
# moe               - Mixture of Experts (only subset active per forward pass)
# hybrid            - Hybrid architecture (e.g., Jamba's Mamba-Transformer)
#
# Provider types:
#
# direct            - Direct API access to model provider
# aggregator        - Routes to multiple underlying providers (adds latency overhead)
#
# =============================================================================
