# =============================================================================
# Converge Model Registry
# =============================================================================
#
# This file defines all available models with their capabilities and metadata.
# The model selector uses this to match requirements to providers.
#
# PROVIDER STRUCTURE:
#   providers:
#     <provider_id>:
#       env_key: ENV_VAR_NAME           # Required for availability check
#       env_key_secondary: VAR_NAME     # Optional secondary key (e.g., Baidu)
#       key_url: https://...            # Where to get an API key
#       api_url: https://...            # API endpoint for requests
#       country: XX                     # ISO country code
#       region: XX                      # Region (EU, US, CN, LOCAL)
#       compliance: [GDPR, SOC2, ...]   # Compliance certifications
#       provider_type: direct|aggregator # Whether this is a direct provider or aggregator
#       models:
#         <model_id>:
#           cost_class: VeryLow|Low|Medium|High|VeryHigh
#           typical_latency_ms: <number>
#           quality: <0.0-1.0>
#           context_tokens: <number>
#           capabilities: [tool_use, vision, reasoning, audio, streaming, ...]
#
#           # === ENRICHED SCHEMA (Phase 1-3) ===
#           # Architecture
#           architecture: dense|moe|hybrid
#           total_params_b: <number>     # Total parameters in billions
#           active_params_b: <number>    # Active params per forward pass (for MoE)
#
#           # Output constraints
#           max_output_tokens: <number>
#
#           # Multimodal
#           native_multimodal: true|false
#           modalities: [text, image, video, audio]
#
#           # Agentic capabilities
#           agentic:
#             max_parallel_agents: <number>
#             supports_orchestration: true|false
#
#           # Reasoning modes
#           thinking_mode: true|false
#           reasoning_effort_levels: [none, low, medium, high, xhigh]
#           native_compaction: true|false
#           thinking_variant: <model_id>
#
#           # Pricing (USD per million tokens)
#           pricing:
#             input_per_m: <number>
#             output_per_m: <number>
#
#           # === RICH METADATA (Phase 4+) ===
#           publisher: <string>          # Model publisher/organization
#           family: <string>             # Model family name
#           release_date: YYYY-MM-DD
#           training_cutoff: YYYY-MM-DD
#           open_weights: true|false
#           license: <string|url>
#           beta: true|false
#           deprecated: true|false
#           benchmarks:                 # Scores keyed by benchmark name
#             mmlu: <number>
#             gsm8k: <number>
#           tags: [coding, long_context, ...]
#           rate_limits:
#             requests_per_min: <number>
#             tokens_per_min: <number>
#             requests_per_day: <number>
#             concurrent_requests: <number>
#           notes: <string>
#
# =============================================================================

