# cargo-deny configuration (0.19.x)
# https://embarkstudios.github.io/cargo-deny/
#
# Run: cargo deny check  (or: just security-audit)

[advisories]
unmaintained = "workspace"
yanked = "warn"
# Ignore-list parity with foundation, plus extension-specific transitive
# advisories from vendor adapters (lancedb, surrealdb, hf-hub, scraper). Each
# entry: transitive crate, no fix upstream, why not in our exposure surface.
ignore = [
    # rsa 0.9.10 — Marvin timing sidechannel. Pulled in by surrealdb-core via
    # jsonwebtoken; only reachable behind `experience-surrealdb` feature, and
    # we do not perform RSA decryption on attacker-controlled ciphertexts.
    "RUSTSEC-2023-0071",
    # atomic-polyfill 1.0.3 — unmaintained. Transitive via heapless used by
    # rstar/geo-types/surrealdb/lance; no direct use, no fix available.
    "RUSTSEC-2023-0089",
    # fxhash 0.2.1 — unmaintained. Transitive via selectors → scraper; only
    # reachable behind the `extract` feature for HTML scraping helpers.
    "RUSTSEC-2025-0057",
    # number_prefix 0.4.0 — unmaintained. Transitive via indicatif → hf-hub;
    # cosmetic progress-bar code, no security exposure.
    "RUSTSEC-2025-0119",
    # paste 1.0.15 — unmaintained proc-macro. Transitive via datafusion/lance;
    # build-time only, no runtime surface, no fix available.
    "RUSTSEC-2024-0436",
    # rustls-pemfile 1.0.4 — unmaintained. Transitive via reqwest 0.11 in
    # hf-hub 0.3; foundation ignores the same advisory at v2.2.0.
    "RUSTSEC-2025-0134",
    # lru 0.12.5 — IterMut unsoundness. Transitive via tantivy → lance-index;
    # we do not call IterMut on lru caches, exposure path is upstream-internal.
    "RUSTSEC-2026-0002",
]

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Zlib",
    "BSL-1.0",
    "CC0-1.0",
    "Unlicense",
    "CDLA-Permissive-2.0",
    # MPL-2.0 — file-level copyleft, OSI/FSF approved. Transitive via
    # cssparser/selectors → scraper (HTML extract feature).
    "MPL-2.0",
]

# Private/unpublished crates (proprietary + internal)
[licenses.private]
ignore = true

[bans]
multiple-versions = "warn"
wildcards = "allow"

[sources]
unknown-registry = "warn"
unknown-git = "allow"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
