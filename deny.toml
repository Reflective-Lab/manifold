# cargo-deny configuration (0.19.x)
# https://embarkstudios.github.io/cargo-deny/
#
# Run: cargo deny check  (or: just security-audit)

[advisories]
unmaintained = "workspace"
yanked = "warn"
# Ignore-list parity with foundation. Update both in lockstep when foundation
# changes. Each entry must be justified inline (transitive crate, no fix
# available, why the path is not in our exposure surface).
ignore = [
    # Add advisories here that the foundation also ignores, with justification.
]

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Zlib",
    "BSL-1.0",
    "CC0-1.0",
    "Unlicense",
    "CDLA-Permissive-2.0",
]

# Private/unpublished crates (proprietary + internal)
[licenses.private]
ignore = true

[bans]
multiple-versions = "warn"
wildcards = "allow"

[sources]
unknown-registry = "warn"
unknown-git = "allow"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
