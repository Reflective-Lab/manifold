name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

env:
  CARGO_TERM_COLOR: always
  RUST_VERSION: "1.94.0"

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Checkout Converge path dependencies
        run: |
          mkdir -p ../../work
          git clone --depth 1 --filter=blob:none https://github.com/Reflective-Lab/converge.git ../../work/converge
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}
      - uses: Swatinem/rust-cache@v2
      - name: Check workspace
        run: cargo check --workspace --all-targets

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@v5
      - name: Checkout Converge path dependencies
        run: |
          mkdir -p ../../work
          git clone --depth 1 --filter=blob:none https://github.com/Reflective-Lab/converge.git ../../work/converge
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}
      - uses: Swatinem/rust-cache@v2
      - name: Run tests
        run: cargo test --workspace --all-targets

  lint:
    name: Lint
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@v5
      - name: Checkout Converge path dependencies
        run: |
          mkdir -p ../../work
          git clone --depth 1 --filter=blob:none https://github.com/Reflective-Lab/converge.git ../../work/converge
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

  format:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Checkout Converge path dependencies
        run: |
          mkdir -p ../../work
          git clone --depth 1 --filter=blob:none https://github.com/Reflective-Lab/converge.git ../../work/converge
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}
          components: rustfmt
      - name: Check formatting
        run: cargo fmt --all -- --check
